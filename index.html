<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteador de Times</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="theme-icons-container">
    <img id="sun-icon" src="assets/icons/sun.svg" alt="Light mode" class="theme-icon">
    <img id="moon-icon" src="assets/icons/moon.svg" alt="Dark mode" class="theme-icon">
  </div>
  <div class="container">
    <!-- Tela 1: Configuração -->
    <div id="screen1" class="screen">
      <h1>Configuração do Sorteio</h1>
      <div class="form-group">
        <label for="gameType">Tipo de Jogo</label>
        <select id="gameType" class="form-control">
          <option value="volei">Vôlei - 6 jogadores</option>
          <option value="futebolCampo">Futebol Campo - 11 jogadores</option>
          <option value="futebolSalao">Futebol Salão - 5 jogadores</option>
          <option value="futebolSete">Futebol Sete - 7 jogadores</option>
          <option value="customizado">Customizado</option>
        </select>

        <div id="customPlayersContainer" class="form-group" style="display: none;">
          <label for="customPlayers">Jogadores por Time</label>
          <input type="number" id="customPlayers" class="form-control" min="2" value="2">
        </div>

        <label for="numberOfTeams">Número de Times</label>
        <input type="number" id="numberOfTeams" class="form-control" min="2" value="2">

        <div class="total-players">
          <p>Jogadores necessários: <span id="totalPlayers">12</span></p>
        </div>

        <div class="button-container">
          <button id="nextButton" class="btn btn-primary">Próximo</button>
        </div>
      </div>
    </div>

    <!-- Tela 2: Adicionar Jogadores -->
    <div id="screen2" class="screen" style="display: none;">
      <h1>Jogadores Adicionados</h1>
      <div class="header-container">
        <button id="addPlayerBtn" class="btn btn-primary">Adicionar</button>
      </div>
      <div class="player-counter">
        <span>Cadastrados: <span id="addedPlayers">0</span> | Faltantes: <span id="remainingPlayers">0</span></span>
      </div>
      <div id="playersList" class="players-list"></div>
      <div class="button-container">
        <button id="backButton" class="btn btn-secondary">Voltar</button>
        <button id="sortButton" class="btn btn-primary" disabled>Sortear Times</button>
      </div>
    </div>

    <!-- Tela 3: Times Sorteados -->
    <div id="screen3" class="screen" style="display: none;">
      <h1>Times Sorteados</h1>
      <div id="teamsContainer" class="teams-container"></div>
      <div class="button-container">
        <button id="backToPlayersButton" class="btn btn-secondary">Voltar</button>
        <button id="newSortButton" class="btn btn-primary">Novo Sorteio</button>
      </div>
    </div>
  </div>

  <!-- Modal Adicionar/Editar Jogador -->
  <div id="playerModal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2 id="modalTitle">Adicionar Jogador</h2>
      <div class="form-group">
        <label for="playerName">Nome do Jogador</label>
        <input type="text" id="playerName" class="form-control" placeholder="Ex: João Silva">
      </div>
      <div class="form-group">
        <label for="playerRating">Nota</label>
        <select id="playerRating" class="form-control">
          <option value="1">Nota 1: Novato</option>
          <option value="2">Nota 2: Promessa</option>
          <option value="3">Nota 3: Titular</option>
          <option value="4">Nota 4: Craque</option>
          <option value="5">Nota 5: Lenda</option>
        </select>
      </div>
      <div class="modal-buttons">
        <button id="cancelButton" class="btn btn-secondary">Cancelar</button>
        <button id="saveButton" class="btn btn-primary">Adicionar</button>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
